[contract]
name        = "telegram-bot-api"
kind        = "external"
types-crate = "rust/crates/transport-tg"
transports  = ["http", "multipart"]
base-url    = "https://api.telegram.org"
docs        = "https://core.telegram.org/bots/api"

# Per-contract translator module: the single sanctioned boundary between our
# strongly-typed `api_types::TelegramReplyMarkup` and the Bot API wire shape.
translator  = "rust/crates/transport-tg/src/telegram_markup.rs"

[[consumer]]
name        = "transport-tg-api"
path        = "rust/crates/transport-tg/src/api.rs"
transports  = ["http", "multipart"]
role        = "Raw Bot API HTTP + multipart client"
enforcement = "scanner"
# Bot API responses are schema we do not own. `serde_json::Value` is
# permitted contract-wide for the raw request/response plumbing here.
allow-value = true
allow-value-reason = "Bot API responses are upstream schema we do not own; translator converts our typed markup to/from Value at this boundary only."

[[consumer]]
name        = "transport-tg-notifications"
path        = "rust/crates/transport-tg/src/notifications.rs"
transports  = ["http"]
role        = "Notification handler + edit-in-place; consumes api_types::NotificationPayload and builds typed keyboards"
enforcement = "scanner"
# Notifications handler sends Bot-API requests through transport-tg-api;
# keyboards are built typed (api_types::TelegramReplyMarkup) but research
# payload parsing still touches upstream Value fields.
allow-value = true
allow-value-reason = "Research SSE payload fields arrive as opaque JSON until the lifecycle-event schema is tightened; outgoing markup is typed via api_types::TelegramReplyMarkup."
