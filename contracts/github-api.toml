[contract]
name        = "github-api"
kind        = "external"
# GitHub access is centralized in the global-github provider boundary, which
# parses `gh` CLI JSON output into typed provider structs.
types-crate = "rust/crates/global-github"
transports  = ["cli"]
base-url    = "https://api.github.com"
docs        = "https://docs.github.com/en/rest"

[[consumer]]
name        = "global-github-provider"
path        = "rust/crates/global-github/src/lib.rs"
transports  = ["cli"]
role        = "GitHub CLI PR, review thread, mergeability, state, and PR creation queries"
enforcement = "scanner"
allow-value = true
allow-value-reason = "GitHub REST/GraphQL and gh CLI responses are upstream schema; the provider parses boundary JSON into typed structs before returning to domains."
