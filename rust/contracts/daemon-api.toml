# Daemon route → lifecycle-transition registry.
#
# Paired with PR #886 (clarify/CC-errors fix) and coordinated with PR #884
# (daemon-consumer wire-type hardening). Each `[[producer]]` entry names
# an HTTP handler that mutates task state and declares the lifecycle
# transitions it can drive. The `check_route_transitions.py` scanner
# validates that:
#
# 1. Every declared transition string (`<from> -> <to>`) is a legal edge
#    in `captain::service::lifecycle::infer_transition_command` (the
#    single source of truth).
# 2. Every handler listed here resolves to an async fn defined under
#    `rust/crates/transport-http/src/transport/`.
#
# If you add a new task-mutating route, add a `[[producer]]` entry with
# the transitions it may take. If you add a new edge to the lifecycle
# table and a route uses it, update the route's `transitions` array here.
# Handlers that do not mutate task state set `transitions = []`.
#
# #884 is expected to widen the schema with additional fields (method,
# request/response types). Keep this file forward-compatible — unknown
# fields in a `[[producer]]` entry are ignored by `check_route_transitions.py`.

[[producer]]
path = "POST /api/tasks/{id}/clarify"
handler = "post_task_clarify"
transitions = [
  "needs-clarification -> clarifying",
  "clarifying -> queued",
  "clarifying -> needs-clarification",
  "clarifying -> completed-no-pr",
  "clarifying -> captain-reviewing",
]

[[producer]]
path = "POST /api/tasks/rework"
handler = "post_task_rework"
transitions = [
  "awaiting-review -> rework",
  "escalated -> rework",
  "errored -> rework",
  "handed-off -> rework",
]

[[producer]]
path = "POST /api/tasks/reopen"
