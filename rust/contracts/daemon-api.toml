  "escalated -> queued",
  "escalated -> captain-reviewing",
  "errored -> in-progress",
  "errored -> queued",
  "errored -> captain-reviewing",
  "handed-off -> in-progress",
  "handed-off -> queued",
  "handed-off -> captain-reviewing",
]

