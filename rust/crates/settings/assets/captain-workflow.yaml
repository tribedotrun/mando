# ── Stream symptom classifier ─────────────────────────────────────────────────
# Broken-session detection is structural, not substring-based. The presence
# of a terminal `{"type":"result","is_error":true,...}` event is itself the
# broken-session verdict (primary path); an externally-killed session (no
# result + last non-system tool_result with `Exit code 137` /
# `Request interrupted by user for tool use`) is the secondary path.
#
# These clauses do NOT decide whether a session is broken. They only LABEL
# which kind of failure the detector routes to. If no rule matches the
# terminal result's text fields, the detector synthesizes a generic
# `IsError`/`cc_is_error` verdict — the session still goes to review.
#
# Matching is applied to narrow, structurally sourced text:
#   most rules      ← terminal `result` event's `result` + `error` + `errors[]`
#   SessionInterrupted ← last non-system user `tool_result`'s content
#   ImageDimensionLimit ← last user `tool_result`'s content (nudge-path only)
#
# Substring false-positives from skill prompts, assistant thinking, task
# text, and routine per-tool `is_error:true` errors are eliminated by the
# structural scope, not by narrowing the clauses.
#
# Match semantics: AND across `clauses`, OR within each clause. A clause
# matches when any of its lowercased substrings appears in the lowercased
# text. First rule (in declaration order) that matches wins.
#
# `name` maps to a typed Rust variant in `global-claude::CcStreamSymptom`;
# changing that field is a breaking API change. `reason` is a log/timeline
# tag consumed by obs queries — also treat as stable.
#
# `broken_session: true` routes the symptom to captain review; `false` keeps
# it on the nudge path (only ImageDimensionLimit, which is recoverable).
#
# Clauses below are anchored to real strings observed in
# ~/.mando/state/cc-streams across 1355 real sessions + documented CC error
# shapes. Ordering: specific failure modes before the generic fallback.
stream_symptoms:
  - name: RateLimitAborted
    reason: rate_limit_aborted
    broken_session: true
    clauses:
      # Observed: "You've hit your limit · resets 10am (America/Mexico_City)"
      # (54/54 real rate-limit result events in corpus).
      # `rate limit` is safe now that matching is scoped to terminal result
      # event text only — the worker-86-2 FP came from skill-template text
      # reaching the old whole-tail matcher, which is no longer possible.
      # Session-manager API error shapes (5-hour / usage / 429) retained.
      - ["hit your limit", "rate limit", "5-hour limit reached", "usage limit reached"]
  - name: StreamIdleTimeout
    reason: stream_idle_timeout
    broken_session: true
    clauses:
      # Observed: "API Error: Stream idle timeout - partial response received"
      - ["stream idle timeout"]
  - name: ContextLengthExceeded
    reason: context_length_exceeded
    broken_session: true
    clauses:
      # Observed: "Prompt is too long".
      # Other phrasings retained for defence in depth across CC versions.
      - ["prompt is too long", "context length exceeded", "input is too long"]
  - name: NoConversationFound
    reason: no_conversation_found
    broken_session: true
    clauses:
      # Observed: appears in result.errors[] as
      # "No conversation found with session ID: <uuid>".
      - ["no conversation found with session id"]
  - name: SessionInterrupted
    reason: session_killed
    broken_session: true
    clauses:
      # Matched against the last non-system user tool_result's content, NOT
      # the terminal result event. Fires when the CC CLI is killed
      # externally (daemon SIGTERM, user interrupt) before it can write a
      # terminal result. Detection path: crate::stream::stream_broken_session_symptom.
      - ["request interrupted by user for tool use", "exit code 137"]
  - name: ImageDimensionLimit
    reason: image_dimension_blocked
    broken_session: false
    clauses:
